# Neko Flow — Hyprland keybinds (append to hypr/custom/keybinds.conf)
#
# Requires neko-flow CLI on PATH (~/.local/bin after install.sh).

bind = Super+Alt, Left, exec, neko-flow-cycle-mode prev
bind = Super+Alt, Right, exec, neko-flow-cycle-mode next
bind = Super+Alt, Up, exec, neko-flow-cycle-option prev
bind = Super+Alt, Down, exec, neko-flow-cycle-option next
bind = Super+Alt, Return, exec, neko-flow-execute
